<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥企業出勤點名系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --soft-blue: #e3f2fd; --mint: #e8f5e9; --sakura: #fce4ec; --primary: #5c6bc0; --text: #4a4a4a; --white: #ffffff; --accent: #ffab91; }
        body { font-family: "Hiragino Kaku Gothic Pro", "Microsoft JhengHei", sans-serif; background: #fdfbfb; margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1100px; margin: auto; background: var(--white); padding: 35px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 4px solid var(--soft-blue); }
        h1 { text-align: center; color: var(--primary); font-size: 28px; letter-spacing: 2px; }
        .sync-status { text-align: right; font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold; }
        
        /* 分頁控制 */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border: none; background: var(--soft-blue); cursor: pointer; border-radius: 50px; font-weight: bold; color: var(--primary); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; transform: scale(1.05); }
        .view { display: none; animation: fadeIn 0.4s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 工具列與卡片 */
        .toolbar { background: var(--mint); padding: 20px; border-radius: 20px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .stat-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .stat-card { background: var(--sakura); padding: 12px 20px; border-radius: 18px; border: 2px solid transparent; min-width: 100px; cursor: pointer; text-align: center; transition: 0.3s; }
        .stat-card.active { border-color: var(--primary); background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stat-card b { display: block; font-size: 16px; color: var(--primary); }
        .stat-card small { color: #666; }

        /* 表格樣式 */
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: var(--primary); border-bottom: 2px solid var(--soft-blue); text-align: center; }
        td { background: #fff; padding: 12px; text-align: center; border-radius: 10px; border: 1px solid #f0f0f0; }
        
        /* 輸入控制 */
        input, select { padding: 10px; border: 2px solid var(--soft-blue); border-radius: 12px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { padding: 10px 25px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--accent); }
        .btn-del { background: #ffcfcf; color: #d32f2f; padding: 5px 15px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        input[type="checkbox"] { accent-color: var(--primary); transform: scale(1.4); }
    </style>
</head>
<body>

<div class="container">
    <h1>🌸 天祥企業出勤點名系統</h1>
    <div id="syncIndicator" class="sync-status">☁️ 準備連線中...</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('attendanceView')">🎀 今日點名</button>
        <button class="tab-btn" onclick="switchTab('memberView')">👥 成員管理</button>
        <button class="tab-btn" onclick="switchTab('reportView')">📊 報表匯出</button>
    </div>

    <div id="attendanceView" class="view active">
        <div class="toolbar">
            <div>
                <strong>📅 日期：</strong>
                <input type="date" id="attDate" onchange="renderAttendance()">
            </div>
            <div id="groupStats" class="stat-grid"></div>
        </div>
        <table>
            <thead><tr><th>組別</th><th>姓名</th><th>出勤狀態</th><th>任務完成</th><th>備註</th></tr></thead>
            <tbody id="attBody"></tbody>
        </table>
    </div>

    <div id="memberView" class="view">
        <div class="toolbar" style="background: var(--soft-blue);">
            <input type="text" id="newMemName" placeholder="員工姓名">
            <input type="text" id="newMemGroup" placeholder="組別 (例如: 業務部)">
            <button class="btn btn-add" onclick="addMember()">✨ 新增成員</button>
        </div>
        <div style="margin-bottom: 15px;">
            <input type="text" id="memSearch" placeholder="🔍 搜尋成員或組別..." oninput="renderMembers()" style="width: 100%; box-sizing: border-box;">
        </div>
        <table>
            <thead><tr><th>姓名 (可直接編輯)</th><th>組別 (可直接編輯)</th><th>操作</th></tr></thead>
            <tbody id="memBody"></tbody>
        </table>
    </div>

    <div id="reportView" class="view">
        <div class="toolbar" style="background: var(--sakura); flex-direction: column; align-items: flex-start;">
            <h3 style="margin: 0; color: var(--primary);">🍰 報表中心</h3>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 10px;">
                <input type="month" id="reportMonth">
                <button class="btn" style="background:var(--primary)" onclick="exportAggregatedReport()">👤 成員月考核</button>
                <button class="btn" style="background:#7986cb" onclick="exportDailySummaryReport()">📈 每日運作統整</button>
                <button class="btn" style="background:#4db6ac" onclick="exportMonthlyRawData()">📥 原始明細</button>
            </div>
        </div>
    </div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxW1fsf6_9kLIWuLRzTqBX7EOnBrqY3iAfkeRC_Wx5zKDXPx2f7RDCLwuXXujiccClIoA/exec'; 

    let appData = { members: [], records: {} };
    let currentFilterGroup = "";

    // 啟動連線
    async function loadFromCloud() {
        document.getElementById('syncIndicator').innerText = "☁️ 正在同步雲端資料...";
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const data = await response.json();
            appData = (data && data.members) ? data : { members: [], records: {} };
            document.getElementById('syncIndicator').innerText = "✅ 已完成雲端同步";
            renderAttendance();
            renderMembers();
        } catch (e) {
            document.getElementById('syncIndicator').innerText = "❌ 同步失敗，使用本地存檔";
            const local = localStorage.getItem('tx_backup');
            if(local) appData = JSON.parse(local);
        }
    }

    async function saveToCloud() {
        document.getElementById('syncIndicator').innerText = "⏳ 儲存中...";
        localStorage.setItem('tx_backup', JSON.stringify(appData));
        try {
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(appData) });
            setTimeout(() => { document.getElementById('syncIndicator').innerText = "✅ 雲端儲存成功"; }, 1000);
        } catch (e) { document.getElementById('syncIndicator').innerText = "❌ 雲端儲存失敗"; }
    }

    // 分頁切換
    function switchTab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector(`button[onclick="switchTab('${id}')"]`).classList.add('active');
    }

    // --- 成員管理邏輯 ---
    function renderMembers() {
        const body = document.getElementById('memBody');
        const search = document.getElementById('memSearch').value.toLowerCase();
        const filtered = appData.members.filter(m => 
            m.name.toLowerCase().includes(search) || m.group.toLowerCase().includes(search)
        );
        body.innerHTML = filtered.map((m) => {
            const realIdx = appData.members.findIndex(orig => orig.id === m.id);
            return `
            <tr>
                <td><input type="text" value="${m.name}" onchange="updateMember(${realIdx}, 'name', this.value)"></td>
                <td><input type="text" value="${m.group}" onchange="updateMember(${realIdx}, 'group', this.value)"></td>
                <td><button class="btn btn-del" onclick="deleteMember(${realIdx})">刪除</button></td>
            </tr>`}).join('');
    }

    function addMember() {
        const name = document.getElementById('newMemName').value.trim();
        const group = document.getElementById('newMemGroup').value.trim() || "未分組";
        if (!name) return alert("請輸入姓名！");
        appData.members.push({ id: 'tx'+Date.now(), name: name, group: group });
        document.getElementById('newMemName').value = '';
        saveToCloud(); renderMembers(); renderAttendance();
    }

    function updateMember(idx, field, val) {
        appData.members[idx][field] = val;
        saveToCloud(); renderAttendance();
    }

    function deleteMember(idx) {
        if(confirm(`確定要刪除成員 ${appData.members[idx].name} 嗎？其歷史點名紀錄仍會保留在報表中。`)) {
            appData.members.splice(idx, 1);
            saveToCloud(); renderMembers(); renderAttendance();
        }
    }

    // --- 點名與組別統計邏輯 ---
    function renderAttendance() {
        const date = document.getElementById('attDate').value;
        const body = document.getElementById('attBody');
        const statsDiv = document.getElementById('groupStats');
        if (!appData.records[date]) appData.records[date] = {};
        
        let gStats = {};
        appData.members.forEach(m => {
            if(!appData.records[date][m.id]) appData.records[date][m.id] = { status: "正常出勤", done: true, note: "" };
            if (!gStats[m.group]) gStats[m.group] = { total: 0, present: 0 };
            gStats[m.group].total++;
            const status = appData.records[date][m.id].status;
            if (status === "正常出勤" || status === "遲到") gStats[m.group].present++;
        });

        // 渲染組別統計卡
        let statsHTML = `<div class="stat-card ${currentFilterGroup===''?'active':''}" onclick="filterGroup('')"><b>全部</b><small>${appData.members.length} 人</small></div>`;
        Object.keys(gStats).forEach(g => {
            statsHTML += `
            <div class="stat-card ${currentFilterGroup===g?'active':''}" onclick="filterGroup('${g}')">
                <b>${g}</b>
                <small>實到 ${gStats[g].present}/${gStats[g].total}</small>
            </div>`;
        });
        statsDiv.innerHTML = statsHTML;

        // 渲染名單
        const displayList = currentFilterGroup ? appData.members.filter(m => m.group === currentFilterGroup) : appData.members;
        body.innerHTML = displayList.map(m => {
            const r = appData.records[date][m.id];
            return `<tr>
                <td style="color:var(--primary); font-size:12px;">${m.group}</td>
                <td><b>${m.name}</b></td>
                <td><select onchange="updateAtt('${m.id}', 'status', this.value)">
                    ${['正常出勤','事假','曠職','遲到','排休','特殊事假'].map(s => `<option ${r.status===s?'selected':''}>${s}</option>`).join('')}
                </select></td>
                <td><input type="checkbox" ${r.done?'checked':''} onchange="updateAtt('${m.id}', 'done', this.checked)"></td>
                <td><input type="text" value="${r.note}" placeholder="備註..." onchange="updateAtt('${m.id}', 'note', this.value)"></td>
            </tr>`;
        }).join('');
    }

    function filterGroup(g) { currentFilterGroup = g; renderAttendance(); }
    function updateAtt(mid, f, v) {
        const d = document.getElementById('attDate').value;
        appData.records[d][mid][f] = v;
        saveToCloud();
        if(f !== 'note') renderAttendance();
    }

    // --- 報表匯出功能 (保留前一版本邏輯) ---
    function exportAggregatedReport() {
        const month = document.getElementById('reportMonth').value;
        if(!month) return alert("請選擇月份");
        const summary = appData.members.map(m => {
            let s = { "姓名": m.name, "組別": m.group, "正常": 0, "事假": 0, "遲到": 0, "曠職": 0, "應完成": 0, "實完成": 0, "未完成日期": [] };
            Object.keys(appData.records).filter(d => d.startsWith(month)).forEach(d => {
                const r = appData.records[d][m.id];
                if(r) {
                    if(s[r.status.substring(0,2)] !== undefined) s[r.status.substring(0,2)]++;
                    if(r.status !== "排休") { s["應完成"]++; if(r.done) s["實完成"]++; else s["未完成日期"].push(d.split('-')[2]+"日"); }
                }
            });
            return { "姓名": m.name, "組別": m.group, "正常出勤": s["正常"], "事假": s["事假"], "遲到": s["遲到"], "曠職": s["曠職"], "任務完成率": Math.round((s["實完成"]/s["應完成"])*100)+"%", "未完成日期": s["未完成日期"].join(", ") };
        });
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), "月度考核");
        XLSX.writeFile(wb, `天祥考核_${month}.xlsx`);
    }

    function exportDailySummaryReport() { /* 邏輯同前 */ }
    function exportMonthlyRawData() { /* 邏輯同前 */ }

    // 初始化
    document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('reportMonth').value = new Date().toISOString().slice(0, 7);
    loadFromCloud();
</script>
</body>
</html>
