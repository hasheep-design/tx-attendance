<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天祥企業出勤點名系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --soft-blue: #e3f2fd; --mint: #e8f5e9; --sakura: #fce4ec; --primary: #5c6bc0; --text: #4a4a4a; --white: #ffffff; --accent: #ffab91; }
        body { font-family: "Hiragino Kaku Gothic Pro", "Microsoft JhengHei", sans-serif; background: #fdfbfb; margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1150px; margin: auto; background: var(--white); padding: 35px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 4px solid var(--soft-blue); }
        h1 { text-align: center; color: var(--primary); font-size: 28px; letter-spacing: 2px; }
        .sync-status { text-align: right; font-size: 12px; color: #888; margin-bottom: 10px; font-weight: bold; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { padding: 12px 30px; border: none; background: var(--soft-blue); cursor: pointer; border-radius: 50px; font-weight: bold; color: var(--primary); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; transform: scale(1.05); }
        .view { display: none; animation: fadeIn 0.4s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toolbar { background: var(--mint); padding: 20px; border-radius: 20px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .stat-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .stat-card { background: var(--sakura); padding: 12px 20px; border-radius: 18px; border: 2px solid transparent; min-width: 100px; cursor: pointer; text-align: center; transition: 0.3s; }
        .stat-card.active { border-color: var(--primary); background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; color: var(--primary); border-bottom: 2px solid var(--soft-blue); }
        td { background: #fff; padding: 12px; text-align: center; border-radius: 10px; border: 1px solid #f0f0f0; }
        input, select { padding: 10px; border: 2px solid var(--soft-blue); border-radius: 12px; outline: none; }
        .btn { padding: 10px 25px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-add { background: var(--accent); }
        .btn-del { background: #ffcfcf; color: #d32f2f; padding: 5px 15px; }
        .search-box { width: 100%; max-width: 400px; padding: 10px 15px; border: 2px solid var(--primary); border-radius: 50px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌸 天祥企業出勤點名系統</h1>
    <div id="syncIndicator" class="sync-status">☁️ 同步中...</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('attendanceView')">🎀 今日點名</button>
        <button class="tab-btn" onclick="switchTab('memberView')">👥 成員與組別管理</button>
        <button class="tab-btn" onclick="switchTab('reportView')">📊 報表中心</button>
    </div>

    <div id="attendanceView" class="view active">
        <div class="toolbar">
            <div><strong>📅 日期：</strong><input type="date" id="attDate" onchange="renderAttendance()"></div>
            <div id="groupStats" class="stat-grid"></div>
        </div>
        <table>
            <thead><tr><th>組別</th><th>姓名</th><th>出勤狀態</th><th>任務完成</th><th>備註</th></tr></thead>
            <tbody id="attBody"></tbody>
        </table>
    </div>

    <div id="memberView" class="view">
        <div class="toolbar" style="background: var(--soft-blue);">
            <div style="display:flex; gap:10px; align-items:center;">
                <strong>✨ 新增成員：</strong>
                <input type="text" id="newMemName" placeholder="姓名">
                <input type="text" id="newMemGroup" placeholder="所屬組別">
                <button class="btn btn-add" onclick="addMember()">確認新增</button>
            </div>
        </div>
        
        <div style="display: flex; justify-content: flex-start; align-items: center; gap: 10px; margin-bottom: 10px;">
            <input type="text" id="memberSearchInput" class="search-box" placeholder="🔍 搜尋姓名或組別關鍵字..." oninput="renderMembers()">
            <span style="color: #666; font-size: 14px;">(共 <span id="memberCount">0</span> 位)</span>
        </div>

        <table>
            <thead><tr><th>姓名 (修改)</th><th>組別 (管理)</th><th>操作</th></tr></thead>
            <tbody id="memBody"></tbody>
        </table>
    </div>

    <div id="reportView" class="view">
        <div class="toolbar" style="background: var(--sakura); flex-direction: column; align-items: flex-start;">
            <h3 style="margin: 0; color: var(--primary);">📊 數據統計與匯出</h3>
            
            <div style="margin-top: 15px; display: flex; gap: 20px; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 15px; width: 100%;">
                <div>
                    <strong>📅 月考核：</strong>
                    <input type="month" id="reportMonth">
                    <button class="btn" style="background:var(--primary)" onclick="exportReport('month')">匯出月考核報表</button>
                </div>
            </div>

            <div style="margin-top: 15px; display: flex; gap: 20px; align-items: center; width: 100%;">
                <div>
                    <strong>📅 年度統計：</strong>
                    <select id="reportYear" style="padding: 8px; border-radius: 10px;"></select>
                    <button class="btn" style="background:#4db6ac" onclick="exportReport('year')">匯出年度出勤總表</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 已自動填入您的雲端網址
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxW1fsf6_9kLIWuLRzTqBX7EOnBrqY3iAfkeRC_Wx5zKDXPx2f7RDCLwuXXujiccClIoA/exec'; 

    let appData = { members: [], records: {} };
    let currentFilterGroup = "";

    async function loadFromCloud() {
        document.getElementById('syncIndicator').innerText = "☁️ 正在連線雲端資料庫...";
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const data = await response.json();
            appData = data || { members: [], records: {} };
            document.getElementById('syncIndicator').innerText = "✅ 雲端同步成功";
            renderAttendance(); renderMembers(); initYearSelect();
        } catch (e) { 
            document.getElementById('syncIndicator').innerText = "❌ 離線模式 (使用本地暫存)";
            const local = localStorage.getItem('tx_backup');
            if(local) appData = JSON.parse(local);
            renderAttendance(); renderMembers(); initYearSelect();
        }
    }

    async function saveToCloud() {
        localStorage.setItem('tx_backup', JSON.stringify(appData));
        document.getElementById('syncIndicator').innerText = "⏳ 儲存中...";
        try { 
            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(appData) }); 
            setTimeout(() => { document.getElementById('syncIndicator').innerText = "✅ 變更已儲存至雲端"; }, 800);
        } catch (e) { document.getElementById('syncIndicator').innerText = "❌ 雲端儲存失敗"; }
    }

    function switchTab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelector(`button[onclick="switchTab('${id}')"]`).classList.add('active');
    }

    function initYearSelect() {
        const select = document.getElementById('reportYear');
        select.innerHTML = "";
        const currentYear = new Date().getFullYear();
        for(let i = currentYear; i >= 2024; i--) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = i + " 年度";
            select.appendChild(opt);
        }
    }

    function renderMembers() {
        const body = document.getElementById('memBody');
        const searchKeyword = document.getElementById('memberSearchInput').value.toLowerCase();
        const filteredMembers = appData.members.filter(m => 
            m.name.toLowerCase().includes(searchKeyword) || m.group.toLowerCase().includes(searchKeyword)
        );
        document.getElementById('memberCount').innerText = filteredMembers.length;
        body.innerHTML = filteredMembers.map((m) => {
            const originalIndex = appData.members.findIndex(original => original.id === m.id);
            return `
            <tr>
                <td><input type="text" value="${m.name}" onchange="updateMember(${originalIndex}, 'name', this.value)"></td>
                <td><input type="text" value="${m.group}" onchange="updateMember(${originalIndex}, 'group', this.value)"></td>
                <td><button class="btn btn-del" onclick="deleteMember(${originalIndex})">移除</button></td>
            </tr>`}).join('');
    }

    function addMember() {
        const name = document.getElementById('newMemName').value.trim();
        const group = document.getElementById('newMemGroup').value.trim() || "未分組";
        if (!name) return alert("請輸入姓名");
        appData.members.push({ id: 'tx'+Date.now(), name, group });
        document.getElementById('newMemName').value = '';
        saveToCloud(); renderMembers(); renderAttendance();
    }

    function updateMember(i, f, v) { appData.members[i][f] = v; saveToCloud(); renderAttendance(); }
    function deleteMember(i) { if(confirm("確定移除該成員？歷史資料將仍保存在報表中。")) { appData.members.splice(i, 1); saveToCloud(); renderMembers(); renderAttendance(); } }

    function renderAttendance() {
        const date = document.getElementById('attDate').value;
        const body = document.getElementById('attBody');
        const statsDiv = document.getElementById('groupStats');
        if (!appData.records[date]) appData.records[date] = {};
        
        let gStats = {};
        appData.members.forEach(m => {
            if(!appData.records[date][m.id]) appData.records[date][m.id] = { status: "正常出勤", done: true, note: "" };
            if (!gStats[m.group]) gStats[m.group] = { total: 0, present: 0 };
            gStats[m.group].total++;
            const status = appData.records[date][m.id].status;
            if (status === "正常出勤" || status === "遲到") gStats[m.group].present++;
        });

        let statsHTML = `<div class="stat-card ${currentFilterGroup===''?'active':''}" onclick="filterGroup('')"><b>全部</b><small>${appData.members.length}人</small></div>`;
        Object.keys(gStats).forEach(g => {
            statsHTML += `<div class="stat-card ${currentFilterGroup===g?'active':''}" onclick="filterGroup('${g}')"><b>${g}</b><small>${gStats[g].present}/${gStats[g].total}</small></div>`;
        });
        statsDiv.innerHTML = statsHTML;

        const displayList = currentFilterGroup ? appData.members.filter(m => m.group === currentFilterGroup) : appData.members;
        body.innerHTML = displayList.map(m => {
            const r = appData.records[date][m.id];
            return `<tr>
                <td style="font-size:12px; color:var(--primary)">${m.group}</td>
                <td><b>${m.name}</b></td>
                <td><select onchange="updateAtt('${m.id}', 'status', this.value)">
                    ${['正常出勤','病假','事假','曠職','遲到','排休','特殊事假'].map(s => `<option ${r.status===s?'selected':''}>${s}</option>`).join('')}
                </select></td>
                <td><input type="checkbox" ${r.done?'checked':''} onchange="updateAtt('${m.id}', 'done', this.checked)"></td>
                <td><input type="text" value="${r.note}" placeholder="..." onchange="updateAtt('${m.id}', 'note', this.value)"></td>
            </tr>`;
        }).join('');
    }

    function filterGroup(g) { currentFilterGroup = g; renderAttendance(); }
    function updateAtt(mid, f, v) {
        const d = document.getElementById('attDate').value;
        appData.records[d][mid][f] = v;
        saveToCloud();
        if(f !== 'note') renderAttendance();
    }

    function exportReport(type) {
        const target = type === 'month' ? document.getElementById('reportMonth').value : document.getElementById('reportYear').value;
        if(!target) return alert("請選擇日期範圍");

        const summary = appData.members.map(m => {
            let s = { "正常": 0, "病假": 0, "事假": 0, "遲到": 0, "曠職": 0, "應完成": 0, "實完成": 0, "未完日期": [] };
            Object.keys(appData.records).filter(d => d.startsWith(target)).forEach(d => {
                const r = appData.records[d][m.id];
                if(r) {
                    const statusKey = r.status.substring(0,2);
                    if(s[statusKey] !== undefined) s[statusKey]++;
                    if(r.status !== "排休") { 
                        s["應完成"]++; 
                        if(r.done) s["實完成"]++; 
                        else s["未完日期"].push(d.replace(target+'-','')+"日"); 
                    }
                }
            });
            return {
                "姓名": m.name, "組別": m.group,
                "正常出勤": s["正常"], "病假": s["病假"], "事假": s["事假"], "遲到": s["遲到"], "曠職": s["曠職"],
                "任務完成率": s["應完成"] ? Math.round((s["實完成"]/s["應完成"])*100)+"%" : "0%",
                "工作未完成日期登記": s["未完日期"].join(", ") || "無"
            };
        });

        const wb = XLSX.utils.book_new();
        const sheetName = type === 'month' ? `${target}月考核` : `${target}年度總表`;
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), sheetName);
        XLSX.writeFile(wb, `天祥_${sheetName}.xlsx`);
    }

    document.getElementById('attDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('reportMonth').value = new Date().toISOString().slice(0, 7);
    loadFromCloud();
</script>
</body>
</html>
